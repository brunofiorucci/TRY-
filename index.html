function tierFor(total) {
  if (total >= 50) return { name: "Élite", min: 50, next: null };
  if (total >= 30) return { name: "Profesional", min: 30, next: 50 };
  if (total >= 15) return { name: "Semi-Pro", min: 15, next: 30 };
  if (total >= 5) return { name: "Amateur", min: 5, next: 15 };
  return { name: "Novato", min: 0, next: 5 };
}
function weekKey(d) {
  var date = new Date(d);
  var onejan = new Date(date.getFullYear(), 0, 1);
  var week = Math.ceil((((date - onejan) / 86400000) + onejan.getDay() + 1) / 7);
  return date.getFullYear() + "-" + week;
}
function daysAgo(n) {
  var d = new Date();
  d.setDate(d.getDate() - n);
  return d;
}
function fmtDate(iso) {
  var d = new Date(iso);
  return d.toLocaleDateString("es-AR", { day: "2-digit", month: "short" });
}
function posByNum(n) {
  for (var i = 0; i < POSITIONS.length; i++) if (POSITIONS[i].num === n) return POSITIONS[i];
  return POSITIONS[8];
}
function card(inner, extraStyle) {
  return '<div class="rounded-2xl" style="background:' + C.card + ';border:1px solid ' + C.line + ';padding:16px;' + (extraStyle || "") + '">' + inner + '</div>';
}
function sectionTitle(text) {
  return '<div style="color:' + C.chalkDim + ';font-size:12px;font-weight:700;letter-spacing:1px;margin-bottom:8px;text-transform:uppercase">' + esc(text) + '</div>';
}
function dots(n, max) {
  max = max || 3;
  var out = '<span style="letter-spacing:2px;color:' + C.ochreBright + ';font-size:10px">';
  for (var i = 0; i < n; i++) out += "●";
  out += '<span style="color:' + C.line + '">';
  for (var j = n; j < max; j++) out += "●";
  out += "</span></span>";
  return out;
}
function focoBadge(foco) {
  var map = {
    "Delantero": { bg: C.ochreDim, fg: C.ochreBright, label: "Delanteros" },
    "Back": { bg: C.skyDim, fg: C.sky, label: "Backs" },
    "Todos": { bg: C.line, fg: C.chalkDim, label: "Todos" }
  };
  var s = map[foco] || map["Todos"];
  return '<span class="rounded-full" style="display:inline-block;padding:2px 8px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;background:' + s.bg + ';color:' + s.fg + '">' + s.label + '</span>';
}
function statBox(value, label, iconName) {
  return card(
    '<div class="flex items-center justify-center" style="gap:4px;color:' + C.chalk + ';font-size:22px;font-family:var(--font-mono);font-weight:700">' +
      (iconName ? icon(iconName, 14, C.ochreBright) : "") + '<span>' + esc(value) + '</span>' +
    '</div>' +
    '<div style="color:' + C.muted + ';font-size:10px;margin-top:2px;text-align:center">' + esc(label) + '</div>',
    "padding:12px;text-align:center"
  );
}
function miniStat(value, label) {
  return '<div class="rounded-xl text-center" style="background:' + C.card + ';border:1px solid ' + C.line + ';padding:8px">' +
    '<div style="color:' + C.ochreBright + ';font-family:var(--font-mono);font-size:16px;font-weight:700">' + esc(value) + '</div>' +
    '<div style="color:' + C.muted + ';font-size:9px">' + esc(label) + '</div></div>';
}
function pitchLineup(selectedNum, handlerJs) {
  var lines = [10, 30, 50, 70, 90];
  var html = '<div class="relative w-full rounded-2xl overflow-hidden" style="aspect-ratio:3/4;background:repeating-linear-gradient(180deg,#16261B 0px,#16261B 34px,#132119 34px,#132119 68px);border:1px solid ' + C.line + '">';
  lines.forEach(function (y) {
    html += '<div class="absolute" style="left:0;right:0;top:' + y + '%;border-top:1px solid rgba(241,239,230,0.18)"></div>';
  });
  html += '<div class="absolute text-center" style="left:0;right:0;top:2%;font-size:9px;color:' + C.chalkDim + ';letter-spacing:2px">INGOAL RIVAL</div>';
  html += '<div class="absolute text-center" style="left:0;right:0;top:95%;font-size:9px;color:' + C.chalkDim + ';letter-spacing:2px">INGOAL PROPIO</div>';
  POSITIONS.forEach(function (p) {
    var isSel = selectedNum === p.num;
    html += '<button onclick="' + handlerJs + '(' + p.num + ')" class="absolute flex items-center justify-center rounded-full" style="left:' + p.x + '%;top:' + p.y + '%;transform:translate(-50%,-50%);width:30px;height:30px;font-family:var(--font-mono);font-size:12px;font-weight:700;background:' + (isSel ? C.ochre : C.bgSoft) + ';color:' + (isSel ? "#1A1006" : C.chalk) + ';border:2px solid ' + (isSel ? C.ochreBright : C.line) + ';box-shadow:' + (isSel ? "0 0 0 4px " + C.ochreDim : "none") + '">' + p.num + '</button>';
  });
  html += "</div>";
  return html;
}
function weeklyBarChart(data) {
  var max = 1;
  data.forEach(function (d) { if (d.sesiones > max) max = d.sesiones; });
  var html = '<div class="flex items-end" style="height:140px;gap:8px;padding:4px 2px 0">';
  data.forEach(function (d, i) {
    var isLast = i === data.length - 1;
    var h = d.sesiones === 0 ? 3 : Math.max(6, (d.sesiones / max) * 100);
    html += '<div class="flex flex-col items-center justify-end flex-1" style="height:100%">' +
      '<div style="color:' + C.muted + ';font-size:10px;margin-bottom:4px;font-family:var(--font-mono)">' + d.sesiones + '</div>' +
      '<div style="width:100%;max-width:22px;height:' + h + 'px;background:' + (isLast ? C.ochre : C.line) + ';border-radius:4px 4px 0 0"></div>' +
      '<div style="color:' + C.muted + ';font-size:9px;margin-top:6px">' + esc(d.label) + '</div>' +
    '</div>';
  });
  html += "</div>";
  return html;
}

/* ---------------------------------------------------------------------- */
/* APP STATE                                                               */
/* ---------------------------------------------------------------------- */
function safeParse(v, fallback) {
  try { var p = JSON.parse(v); return p == null ? fallback : p; } catch (e) { return fallback; }
}
function defaultMatchForm() {
  return {
    date: new Date().toISOString().slice(0, 10), rival: "", positionNum: 9, minutes: 80,
    tries: 0, conversions: 0, tackles: 0, passes: 0, carries: 0, turnovers: 0, note: ""
  };
}

var App = {
  state: {
    tab: "home",
    sessions: [],
    matches: [],
    profile: JSON.parse(JSON.stringify(DEFAULT_PROFILE)),
    trainingQueue: null,
    showMatchForm: false,
    levelUp: null,
    toast: null,
    openExercise: null,
    catFilter: "Todas",
    historyOpen: null,
    infoOpen: "backup"
  },
  matchForm: defaultMatchForm(),
  toastToken: 0,

  init: function () {
    try { this.state.sessions = safeParse(localStorage.getItem("rugby-sessions"), []); } catch (e) { this.state.sessions = []; }
    try { this.state.matches = safeParse(localStorage.getItem("rugby-matches"), []); } catch (e) { this.state.matches = []; }
    try {
      var p = safeParse(localStorage.getItem("rugby-profile"), null);
      this.state.profile = p ? Object.assign({}, DEFAULT_PROFILE, p) : JSON.parse(JSON.stringify(DEFAULT_PROFILE));
    } catch (e) { this.state.profile = JSON.parse(JSON.stringify(DEFAULT_PROFILE)); }
    this.render();
  },

  persistSessions: function (next) {
    this.state.sessions = next;
    try { localStorage.setItem("rugby-sessions", JSON.stringify(next)); } catch (e) { this.showToast("No se pudo guardar. Probá de nuevo."); }
  },
  persistMatches: function (next) {
    this.state.matches = next;
    try { localStorage.setItem("rugby-matches", JSON.stringify(next)); } catch (e) { this.showToast("No se pudo guardar. Probá de nuevo."); }
  },
  persistProfile: function (next) {
    this.state.profile = next;
    try { localStorage.setItem("rugby-profile", JSON.stringify(next)); } catch (e) {}
  },
  deleteSession: function (id) {
    if (!window.confirm("¿Borrar esta sesión de entrenamiento? No se puede deshacer.")) return;
    var next = this.state.sessions.filter(function (x) { return x.id !== id; });
    this.persistSessions(next);
    this.state.historyOpen = null;
    this.showToast("Sesión borrada");
  },
  deleteMatch: function (id) {
    if (!window.confirm("¿Borrar este partido? No se puede deshacer.")) return;
    var next = this.state.matches.filter(function (x) { return x.id !== id; });
    this.persistMatches(next);
    this.showToast("Partido borrado");
  },
  resetAllData: function () {
    if (!window.confirm("Esto borra TODAS las sesiones, partidos y tu perfil guardados en este dispositivo. No se puede deshacer. ¿Continuar?")) return;
    try { localStorage.removeItem("rugby-sessions"); localStorage.removeItem("rugby-matches"); localStorage.removeItem("rugby-profile"); } catch (e) {}
    location.reload();
  },

  showToast: function (msg) {
    var self = this;
    this.state.toast = msg;
    this.toastToken++;
    var myToken = this.toastToken;
    this.render();
    setTimeout(function () {
      if (self.toastToken === myToken) { self.state.toast = null; self.render(); }
    }, 2400);
  },

  setTab: function (t) { this.state.tab = t; this.render(); },
  goToAbout: function () { this.state.tab = "info"; this.state.infoOpen = "dev"; this.render(); var el = document.getElementById("app"); if (el) el.scrollIntoView({ block: "start" }); },
  selectPosition: function (n) { this.persistProfile(Object.assign({}, this.state.profile, { positionNum: n })); this.render(); },
  setProfileName: function (value) { this.state.profile.name = value; },
  saveProfileName: function () { this.persistProfile(Object.assign({}, this.state.profile, { name: this.state.profile.name || "" })); this.showToast("Nombre guardado"); },
  changeGoal: function (g) { g = Math.max(1, Math.min(7, g)); this.persistProfile(Object.assign({}, this.state.profile, { weeklyGoal: g })); this.render(); },
  cyclePlanDay: function (i) {
    var plan = (this.state.profile.weeklyPlan || DEFAULT_PROFILE.weeklyPlan).slice();
    var idx = PLAN_TYPES.indexOf(plan[i]);
    plan[i] = PLAN_TYPES[(idx + 1) % PLAN_TYPES.length];
    this.persistProfile(Object.assign({}, this.state.profile, { weeklyPlan: plan }));
    this.render();
  },
  setCatFilter: function (c) { this.state.catFilter = c; this.render(); },
  toggleExercise: function (id) { this.state.openExercise = this.state.openExercise === id ? null : id; this.render(); },
  toggleHistory: function (id) { this.state.historyOpen = this.state.historyOpen === id ? null : id; this.render(); },
  toggleInfo: function (k) { this.state.infoOpen = this.state.infoOpen === k ? null : k; this.render(); },

  buildSession: function (positionNum) {
    var pos = posByNum(positionNum);
    var group = pos.group;
    var preferredCats = group === "Delantero"
      ? ["Scrum", "Line-out", "Ruck y Maul", "Tackleo", "Físico y contacto"]
      : ["Pase y manejo", "Patada", "Evasión y espacios", "Tackleo", "Físico y contacto"];
    var chosen = [];
    preferredCats.forEach(function (cat) {
      var opts = EXERCISES.filter(function (e) { return e.cat === cat && (e.foco === "Todos" || e.foco === group); });
      if (opts.length) chosen.push(opts[Math.floor(Math.random() * opts.length)]);
    });
    return chosen;
  },
  startTraining: function (positionNum) {
    var exs = this.buildSession(positionNum);
    this.state.trainingQueue = { positionNum: positionNum, exercises: exs, checked: {} };
    this.render();
  },
  regenerateTraining: function () { this.startTraining(this.state.trainingQueue.positionNum); },
  toggleCheck: function (id) {
    var q = this.state.trainingQueue;
    q.checked[id] = !q.checked[id];
    this.render();
  },
  cancelTraining: function () { this.state.trainingQueue = null; this.render(); },
  saveTraining: function () {
    var q = this.state.trainingQueue;
    if (!q) return;
    var done = q.exercises.filter(function (e) { return q.checked[e.id]; });
    if (done.length === 0) { this.showToast("Marcá al menos un ejercicio."); return; }
    var durationMin = done.reduce(function (a, e) { return a + e.dur; }, 0);
    var newSession = {
      id: Date.now(), date: new Date().toISOString(), positionNum: q.positionNum,
      exercises: done.map(function (e) { return { id: e.id, name: e.name, cat: e.cat, dur: e.dur }; }),
      durationMin: durationMin
    };
    var prevTier = tierFor(this.state.sessions.length);
    var next = this.state.sessions.concat([newSession]);
    this.persistSessions(next);
    var newTier = tierFor(next.length);
    this.state.trainingQueue = null;
    this.state.tab = "home";
    if (newTier.name !== prevTier.name) { this.state.levelUp = newTier; this.render(); }
    else { this.showToast("¡Sesión guardada!"); }
  },
  closeLevelUp: function () { this.state.levelUp = null; this.render(); },

  openMatchForm: function () { this.matchForm = defaultMatchForm(); this.state.showMatchForm = true; this.render(); },
  closeMatchForm: function () { this.state.showMatchForm = false; this.render(); },
  setMatchPosition: function (n) { this.matchForm.positionNum = n; this.render(); },
  setMatchField: function (key, value) { this.matchForm[key] = value; },
  setMatchNumber: function (key, value) {
    var n = Math.max(0, Number(value) || 0);
    this.matchForm[key] = n;
    var el = document.getElementById("mf_" + key);
    if (el) el.value = n;
  },
  saveMatch: function () {
    var next = this.state.matches.concat([Object.assign({}, this.matchForm, { id: Date.now() })]);
    this.persistMatches(next);
    this.state.showMatchForm = false;
    this.showToast("¡Partido registrado!");
  },

  /* ---------------------- BACKUP: EXPORT / IMPORT ---------------------- */
  exportBackup: function () {
    var payload = {
      app: "TRY+ Entrenamiento de Rugby", backupVersion: 1, exportedAt: new Date().toISOString(),
      sessions: this.state.sessions, matches: this.state.matches, profile: this.state.profile
    };
    var blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    var stamp = new Date().toISOString().slice(0, 10);
    a.href = url; a.download = "tryplus-backup-" + stamp + ".json";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    this.showToast("Copia de seguridad descargada");
  },
  triggerImport: function () {
    var el = document.getElementById("importFileInput");
    if (el) el.click();
  },
  importBackupFromInput: function (input) {
    var self = this;
    var file = input.files && input.files[0];
    input.value = "";
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function () {
      try {
        var data = JSON.parse(String(reader.result));
        if (!data || typeof data !== "object") throw new Error("bad format");
        var ok = window.confirm("Esto va a reemplazar los datos guardados en este dispositivo por los del archivo. ¿Continuar?");
        if (!ok) return;
        if (Array.isArray(data.sessions)) self.persistSessions(data.sessions);
        if (Array.isArray(data.matches)) self.persistMatches(data.matches);
        if (data.profile && typeof data.profile === "object") self.persistProfile(Object.assign({}, DEFAULT_PROFILE, data.profile));
        self.showToast("¡Datos importados correctamente!");
        self.render();
      } catch (e) {
        self.showToast("No se pudo leer ese archivo de respaldo.");
      }
    };
    reader.onerror = function () { self.showToast("No se pudo leer ese archivo de respaldo."); };
    reader.readAsText(file);
  },

  /* ---------------------------------------------------------------------- */
  /* RENDER                                                                  */
  /* ---------------------------------------------------------------------- */
  render: function () {
    var scrollY = window.scrollY;
    var s = this.state;
    var totalSessions = s.sessions.length;
    var wk = weekKey(new Date());
    var thisWeekSessions = s.sessions.filter(function (x) { return weekKey(x.date) === wk; }).length;

    var weeks = {};
    s.sessions.forEach(function (x) { weeks[weekKey(x.date)] = true; });
    var streak = 0, cursor = new Date();
    while (weeks[weekKey(cursor)]) { streak++; cursor.setDate(cursor.getDate() - 7); }

    var tier = tierFor(totalSessions);
    var selectedPosition = posByNum(s.profile.positionNum);
    var lastSession = s.sessions.length ? s.sessions[s.sessions.length - 1] : null;

    var weeklyChartData = [];
    for (var i = 5; i >= 0; i--) {
      var d = daysAgo(i * 7);
      var wkk = weekKey(d);
      var count = s.sessions.filter(function (x) { return weekKey(x.date) === wkk; }).length;
      weeklyChartData.push({ label: i === 0 ? "Esta" : ("-" + i + "sem"), sesiones: count });
    }

    var categoryCounts = {};
    CATEGORIES.forEach(function (c) { categoryCounts[c] = 0; });
    s.sessions.forEach(function (x) { x.exercises.forEach(function (e) { categoryCounts[e.cat] = (categoryCounts[e.cat] || 0) + 1; }); });
    var favoriteCategory = null, bestN = 0;
    Object.keys(categoryCounts).forEach(function (c) { if (categoryCounts[c] > bestN) { favoriteCategory = c; bestN = categoryCounts[c]; } });

    var weekCounts = {};
    s.sessions.forEach(function (x) { var k = weekKey(x.date); weekCounts[k] = (weekCounts[k] || 0) + 1; });
    var bestWeek = 0;
    Object.keys(weekCounts).forEach(function (k) { if (weekCounts[k] > bestWeek) bestWeek = weekCounts[k]; });

    var careerTotals = s.matches.reduce(function (acc, m) {
      return { tries: acc.tries + (m.tries || 0), tackles: acc.tackles + (m.tackles || 0), passes: acc.passes + (m.passes || 0), carries: acc.carries + (m.carries || 0) };
    }, { tries: 0, tackles: 0, passes: 0, carries: 0 });

    var content = "";
    if (s.tab === "home") content = this.renderHome(totalSessions, thisWeekSessions, streak, tier, selectedPosition, lastSession);
    else if (s.tab === "exercises") content = this.renderExercises();
    else if (s.tab === "train") content = this.renderTrain(selectedPosition);
    else if (s.tab === "progress") content = this.renderProgress(tier, weeklyChartData, categoryCounts, favoriteCategory, streak, bestWeek);
    else if (s.tab === "matches") content = this.renderMatches(careerTotals);
    else if (s.tab === "info") content = this.renderInfo();

    var nav = this.renderNav();
    var toast = s.toast ? ('<div class="fixed rounded-full" style="left:50%;bottom:96px;transform:translateX(-50%);padding:8px 16px;font-size:14px;font-weight:500;background:' + C.chalk + ';color:' + C.bg + ';z-index:50">' + esc(s.toast) + '</div>') : "";
    var levelUp = s.levelUp ? this.renderLevelUp() : "";
    var matchModal = s.showMatchForm ? this.renderMatchModal() : "";

    var devFooterCredit =
      '<button onclick="App.goToAbout()" class="w-full flex items-center justify-center rounded-xl" style="gap:6px;margin-top:22px;padding:11px;background:' + C.cardAlt + ';border:1px solid ' + C.line + ';color:' + C.muted + ';font-size:11px">' +
        '💻 Hecho por <span style="color:' + C.ochreBright + ';font-weight:700">Bruno Fiorucci</span>' +
      '</button>';

    var html =
      '<div style="background:' + C.bg + ';min-height:100vh;font-family:var(--font-body)">' +
        '<div class="max-w-md mx-auto relative" style="min-height:100vh;background:' + C.bg + '">' +
          '<div class="flex items-center justify-between" style="padding:24px 20px 12px">' +
            '<div>' +
              '<div style="font-family:var(--font-display);color:' + C.chalk + ';font-size:26px;letter-spacing:1px;font-weight:800">TRY<span style="color:' + C.ochre + '">+</span></div>' +
              '<div style="color:' + C.muted + ';font-size:11px;letter-spacing:1px">ENTRENAMIENTO DE RUGBY</div>' +
            '</div>' +
            '<div class="flex items-center justify-center rounded-full" style="width:44px;height:44px;background:' + C.cardAlt + ';border:1px solid ' + C.line + ';color:' + C.ochreBright + ';font-family:var(--font-mono);font-weight:700">' + selectedPosition.num + '</div>' +
          '</div>' +
          '<div style="padding:0 20px 112px">' + content + devFooterCredit + '</div>' +
          nav +
          toast +
          levelUp +
          matchModal +
        '</div>' +
      '</div>';

    document.getElementById("app").innerHTML = html;
    window.scrollTo(0, scrollY);
  },

  renderNav: function () {
    var s = this.state;
    var items = [
      { id: "home", label: "Inicio", icon: "home" },
      { id: "exercises", label: "Ejerc.", icon: "list" },
      { id: "train", label: "Entrenar", icon: "play", big: true },
      { id: "progress", label: "Progreso", icon: "trending" },
      { id: "matches", label: "Partidos", icon: "shield" },
      { id: "info", label: "Info", icon: "bookOpen" }
    ];
    var html = '<div class="fixed flex items-center justify-around max-w-md mx-auto" style="bottom:0;left:0;right:0;padding:8px 4px;background:' + C.bgSoft + ';border-top:1px solid ' + C.line + '">';
    items.forEach(function (it) {
      var active = s.tab === it.id;
      var size = it.big ? 40 : 30;
      html += '<button onclick="App.setTab(\'' + it.id + '\')" class="flex flex-col items-center" style="gap:2px;padding:0 4px">' +
        '<div class="flex items-center justify-center rounded-full" style="width:' + size + 'px;height:' + size + 'px;background:' + (active ? C.ochre : "transparent") + ';color:' + (active ? "#1A1006" : C.muted) + '">' + icon(it.icon, it.big ? 20 : 16, "currentColor") + '</div>' +
        '<span style="font-size:8px;letter-spacing:.3px;color:' + (active ? C.chalk : C.muted) + '">' + it.label.toUpperCase() + '</span>' +
      '</button>';
    });
    html += "</div>";
    return html;
  },

  renderLevelUp: function () {
    var lv = this.state.levelUp;
    return '<div class="fixed flex items-center justify-center inset-0" style="padding:0 24px;background:rgba(0,0,0,0.7);z-index:60">' +
      card(
        '<div style="margin:0 auto 10px;width:40px">' + icon("trophy", 40, C.ochreBright) + '</div>' +
        '<div style="color:' + C.chalkDim + ';font-size:12px;letter-spacing:1px">¡SUBISTE DE NIVEL!</div>' +
        '<div style="font-family:var(--font-display);color:' + C.chalk + ';font-size:30px;margin-top:4px;font-weight:800">' + esc(lv.name) + '</div>' +
        '<button onclick="App.closeLevelUp()" class="w-full rounded-xl" style="margin-top:16px;padding:12px;font-weight:700;background:' + C.ochre + ';color:#1A1006">Seguir entrenando</button>',
        "text-align:center;width:100%;max-width:320px;border-color:" + C.ochre + ";border:1px solid " + C.ochre
      ) +
    '</div>';
  },

  renderHome: function (totalSessions, thisWeekSessions, streak, tier, selectedPosition, lastSession) {
    var s = this.state;
    var dayIndex = Math.floor(Date.now() / 86400000) % TIPS.length;
    var tip = TIPS[dayIndex];
    var goal = s.profile.weeklyGoal || 3;
    var goalPct = Math.min(100, (thisWeekSessions / goal) * 100);

    html += '<div class="grid grid-cols-3" style="gap:8px">' + statBox(totalSessions, "Sesiones totales") + statBox(thisWeekSessions, "Esta semana") + statBox(streak, "Racha (sem.)", "flame") + '</div>';

    html += card(
      '<div class="flex items-center justify-between">' +
        '<div class="flex items-center" style="gap:8px">' + icon("target", 16, C.ochreBright) + '<span style="color:' + C.chalk + ';font-weight:700;font-size:13px">Objetivo semanal</span></div>' +

          '<button onclick="App.changeGoal(' + (goal - 1) + ')" class="flex items-center justify-center rounded-full" style="width:24px;height:24px;background:' + C.cardAlt + ';border:1px solid ' + C.line + '">' + icon("minus", 12, C.chalkDim) + '</button>' +
          '<span style="color:' + C.chalk + ';font-family:var(--font-mono);font-size:13px;width:14px;text-align:center">' + goal + '</span>' +

      '</div>' +
      '<div class="rounded-lg overflow-hidden" style="height:6px;background:' + C.line + ';margin-top:10px">' +

      '</div>' +
      '<div style="color:' + C.muted + ';font-size:11px;margin-top:6px">' + (thisWeekSessions >= goal ? "¡Objetivo cumplido esta semana! 🏉" : (thisWeekSessions + " de " + goal + " sesiones esta semana")) + '</div>'
    );

    html += card(
      '<div class="flex items-start" style="gap:8px">' + icon("lightbulb", 16, C.ochreBright) +
        '<div><div style="color:' + C.ochreBright + ';font-size:10px;font-weight:700;letter-spacing:1px">CONSEJO DEL DÍA</div>' +
        '<div style="color:' + C.chalk + ';font-size:12px;margin-top:3px;line-height:1.5">' + esc(tip) + '</div></div>' +
      '</div>',
      "background:" + C.ochreDim + ";border-color:" + C.ochre + ";border:1px solid " + C.ochre
    );

    html += '<button onclick="App.setTab(\'train\')" class="w-full rounded-2xl flex items-center justify-center" style="gap:8px;padding:16px;font-weight:700;font-size:15px;background:' + C.ochre + ';color:#1A1006">' + icon("play", 20, "#1A1006") + '<span>Empezar entrenamiento</span></button>';

    var progressBar = "";
    if (tier.next) {
      var pct = Math.min(100, ((totalSessions - tier.min) / (tier.next - tier.min)) * 100);
      progressBar = '<div style="margin-top:12px"><div class="rounded-lg overflow-hidden" style="height:6px;background:' + C.line + '"><div style="height:100%;width:' + pct + '%;background:' + C.ochre + '"></div></div>' +
        '<div style="color:' + C.muted + ';font-size:10px;margin-top:4px">' + (tier.next - totalSessions) + ' sesiones para el próximo nivel</div></div>';
    }
    html += card(
      '<div class="relative" style="position:absolute;right:-20px;top:-30px;font-size:140px;font-family:var(--font-display);color:rgba(201,134,47,0.08);line-height:1">' + selectedPosition.num + '</div>' +
      '<div class="relative">' +
        '<div style="color:' + C.muted + ';font-size:11px;letter-spacing:1px">TU CARTA</div>' +
        '<div style="font-family:var(--font-display);color:' + C.chalk + ';font-size:24px;margin-top:2px;font-weight:800">' + esc(selectedPosition.name) + '</div>' +
        '<div class="flex items-center" style="gap:8px;margin-top:4px">' + focoBadge(selectedPosition.group) + '<span style="color:' + C.ochreBright + ';font-size:12px;font-weight:700">' + esc(tier.name) + '</span></div>' +
        progressBar +
      '</div>',
      "background:linear-gradient(135deg," + C.cardAlt + "," + C.card + ");border-color:" + C.ochreDim + ";border:1px solid " + C.ochreDim + ";position:relative;overflow:hidden"
    );

    html += '<div>' + sectionTitle("Tu posición") + card(
      pitchLineup(selectedPosition.num, "App.selectPosition") +
      '<div style="margin-top:12px">' +
        '<div style="color:' + C.chalk + ';font-weight:700;font-size:14px">' + selectedPosition.num + ' · ' + esc(selectedPosition.name) + '</div>' +
        '<div style="color:' + C.muted + ';font-size:12px;margin-top:4px;line-height:1.5">' + esc(selectedPosition.desc) + '</div>' +
      '</div>'
    ) + '</div>';

    if (lastSession) {
      var em = CAT_EMOJI[lastSession.exercises[0] ? lastSession.exercises[0].cat : ""] || "🏉";
      html += '<div>' + sectionTitle("Última sesión") + card(
        '<div class="flex items-center justify-between">' +
          '<div><div style="color:' + C.chalk + ';font-weight:700;font-size:14px">' + fmtDate(lastSession.date) + '</div>' +
          '<div style="color:' + C.muted + ';font-size:12px">' + lastSession.exercises.length + ' ejercicios · ' + lastSession.durationMin + ' min</div></div>' +
          '<div style="color:' + C.ochreBright + ';font-size:20px">' + em + '</div>' +
        '</div>'
      ) + '</div>';
    }

    html += '<div style="color:' + C.muted + ';font-size:11px;text-align:center;margin-top:4px">💾 Progreso guardado en este navegador · hacé una copia en la pestaña Info</div>';
    html += "</div>";
    return html;
  },

  renderTrain: function (selectedPosition) {

      var dayBtns = "";
      DAY_LABELS.forEach(function (d, i) {
        dayBtns += '<button onclick="App.cyclePlanDay(' + i + ')" class="flex flex-col items-center rounded-lg" style="gap:4px;padding:8px 0;background:' + C.cardAlt + ';border:1px solid ' + C.line + '">' +
          '<span style="font-size:9px;color:' + C.muted + '">' + d + '</span><span style="font-size:15px">' + PLAN_EMOJI[plan[i]] + '</span></button>';

      html += card(pitchLineup(selectedPosition.num, "App.selectPosition") + '<div style="margin-top:12px;color:' + C.chalk + ';font-weight:700;font-size:14px">' + selectedPosition.num + ' · ' + esc(selectedPosition.name) + '</div>');

      html += '<button onclick="App.startTraining(' + selectedPosition.num + ')" class="w-full rounded-2xl flex items-center justify-center" style="gap:8px;padding:16px;font-weight:700;font-size:15px;background:' + C.ochre + ';color:#1A1006">' + icon("target", 18, "#1A1006") + '<span>Generar entrenamiento</span></button>';
      html += "</div>";
      return html;
    }

    var doneCount = Object.keys(q.checked).filter(function (k) { return q.checked[k]; }).length;
    var totalMin = q.exercises.filter(function (e) { return q.checked[e.id]; }).reduce(function (a, e) { return a + e.dur; }, 0);
    var pos = posByNum(q.positionNum);

    var html2 = '<div class="flex flex-col" style="gap:16px;margin-top:4px">';
    html2 += '<div class="flex items-center justify-between">' +
      '<div><div style="color:' + C.chalk + ';font-size:20px;font-weight:800">Sesión de hoy</div><div style="color:' + C.muted + ';font-size:12px">' + esc(pos.name) + '</div></div>' +
      '<button onclick="App.regenerateTraining()" class="rounded-full" style="padding:8px;background:' + C.card + ';border:1px solid ' + C.line + '">' + icon("rotateCcw", 16, C.chalkDim) + '</button>' +
    '</div>';

    html2 += card(
      '<div class="flex items-center justify-between"><div style="color:' + C.chalkDim + ';font-size:12px">Completados</div>' +
      '<div style="color:' + C.ochreBright + ';font-size:12px;font-family:var(--font-mono)">' + doneCount + '/' + q.exercises.length + ' · ' + totalMin + ' min</div></div>' +
      '<div class="rounded-lg overflow-hidden" style="height:6px;background:' + C.line + ';margin-top:6px"><div style="height:100%;width:' + ((doneCount / q.exercises.length) * 100) + '%;background:' + C.ochre + '"></div></div>',
      "padding:12px"
    );

    html2 += '<div class="flex flex-col" style="gap:8px">';
    q.exercises.forEach(function (e) {
      var checked = !!q.checked[e.id];
      html2 += '<button onclick="App.toggleCheck(\'' + e.id + '\')" class="w-full text-left">' + card(
        '<div class="flex items-center" style="gap:12px">' +
          '<div class="flex items-center justify-center rounded-full flex-shrink-0" style="width:26px;height:26px;background:' + (checked ? C.ochre : "transparent") + ';border:2px solid ' + (checked ? C.ochre : C.muted) + '">' + (checked ? icon("check", 14, "#1A1006") : "") + '</div>' +
          '<span style="font-size:18px">' + CAT_EMOJI[e.cat] + '</span>' +
          '<div class="flex-1"><div style="color:' + C.chalk + ';font-weight:700;font-size:13px;text-decoration:' + (checked ? "line-through" : "none") + '">' + esc(e.name) + '</div>' +
          '<div style="color:' + C.muted + ';font-size:11px;margin-top:2px">' + esc(e.cat) + ' · ' + e.dur + ' min</div></div>' +
        '</div>',
        "padding:12px;border-color:" + (checked ? C.ochre : C.line) + ";border:1px solid " + (checked ? C.ochre : C.line) + ";opacity:" + (checked ? 1 : 0.9)
      ) + '</button>';
    });
    html2 += "</div>";

    html2 += '<div class="flex" style="gap:8px;margin-top:8px">' +
      '<button onclick="App.cancelTraining()" class="flex-1 rounded-xl" style="padding:12px;font-weight:600;background:' + C.card + ';color:' + C.chalkDim + ';border:1px solid ' + C.line + '">Cancelar</button>' +
      '<button onclick="App.saveTraining()" class="flex-1 rounded-xl" style="padding:12px;font-weight:700;background:' + C.ochre + ';color:#1A1006">Guardar sesión</button>' +
    '</div>';
    html2 += "</div>";
    return html2;
  },

  renderProgress: function (tier, weeklyChartData, categoryCounts, favoriteCategory, streak, bestWeek) {
    var s = this.state;
    var maxCat = 1;
    Object.keys(categoryCounts).forEach(function (c) { if (categoryCounts[c] > maxCat) maxCat = categoryCounts[c]; });
    var totalMinutes = s.sessions.reduce(function (a, x) { return a + (x.durationMin || 0); }, 0);

    var html = '<div class="flex flex-col" style="gap:16px;margin-top:4px">';
    html += '<div><div style="color:' + C.chalk + ';font-size:20px;font-weight:800">Progreso</div><div style="color:' + C.muted + ';font-size:12px">Nivel de jugador: <span style="color:' + C.ochreBright + ';font-weight:700">' + esc(tier.name) + '</span></div></div>';

    html += card('<div style="color:' + C.chalkDim + ';font-size:12px;margin-bottom:8px">Últimas 6 semanas</div>' + weeklyBarChart(weeklyChartData));

    var catRows = "";
    CATEGORIES.forEach(function (c) {
      catRows += '<div><div class="flex items-center justify-between" style="font-size:12px"><span style="color:' + C.chalkDim + '">' + CAT_EMOJI[c] + ' ' + esc(c) + '</span><span style="color:' + C.muted + ';font-family:var(--font-mono)">' + categoryCounts[c] + '</span></div>' +
        '<div class="rounded-lg overflow-hidden" style="height:5px;background:' + C.line + ';margin-top:4px"><div style="height:100%;width:' + ((categoryCounts[c] / maxCat) * 100) + '%;background:' + C.ochre + '"></div></div></div>';
    });
    html += '<div>' + sectionTitle("Por categoría") + '<div class="rounded-2xl flex flex-col" style="background:' + C.card + ';border:1px solid ' + C.line + ';padding:16px;gap:10px">' + catRows + '</div></div>';

    html += '<div>' + sectionTitle("Récords personales") +
      '<div class="grid grid-cols-3" style="gap:8px">' + statBox(streak, "Racha máx. (sem.)", "flame") + statBox(bestWeek, "Mejor semana", "trophy") + statBox(totalMinutes, "Minutos totales") + '</div>' +
      (favoriteCategory ? ('<div style="color:' + C.muted + ';font-size:12px;margin-top:8px">Categoría favorita: <span style="color:' + C.chalk + '">' + CAT_EMOJI[favoriteCategory] + ' ' + esc(favoriteCategory) + '</span></div>') : "") +
    '</div>';

    html += '<div>' + sectionTitle("Diario del jugador");
    if (s.sessions.length === 0) {
      html += card("Todavía no registraste sesiones.", "text-align:center;color:" + C.muted + ";font-size:12px");
    }
    html += '<div class="flex flex-col" style="gap:8px">';
    s.sessions.slice().reverse().forEach(function (sess) {
      var open = s.historyOpen === sess.id;
      var pos = posByNum(sess.positionNum);
      var exList = "";
      sess.exercises.forEach(function (e) {
        exList += '<div style="color:' + C.chalkDim + ';font-size:11px">' + CAT_EMOJI[e.cat] + ' ' + esc(e.name) + ' · ' + e.dur + ' min</div>';
      });
      html += card(
        '<button onclick="App.toggleHistory(' + sess.id + ')" class="w-full flex items-center justify-between">' +
          '<div class="text-left"><div style="color:' + C.chalk + ';font-weight:700;font-size:13px">' + fmtDate(sess.date) + '</div>' +
          '<div style="color:' + C.muted + ';font-size:11px">' + esc(pos.name) + ' · ' + sess.exercises.length + ' ejercicios · ' + sess.durationMin + ' min</div></div>' +
          '<span style="transform:' + (open ? "rotate(180deg)" : "none") + '">' + icon("chevronDown", 14, C.muted) + '</span>' +
        '</button>' +
        (open ? ('<div class="flex flex-col" style="gap:4px;margin-top:8px;padding-top:8px;border-top:1px solid ' + C.line + '">' + exList +
          '<button onclick="event.stopPropagation();App.deleteSession(' + sess.id + ')" style="margin-top:8px;color:' + C.danger + ';font-size:11px;font-weight:600;text-align:left">Borrar sesión</button>' +
        '</div>') : ""),
        "padding:12px"
      );
    });
    html += "</div></div></div>";
    return html;
  },

  renderMatchModal: function () {

        '<input type="' + type + '" value="' + esc(value) + '" oninput="App.setMatchField(\'' + key + '\', this.value)" class="w-full rounded-lg outline-none" style="padding:8px 12px;background:' + C.card + ';border:1px solid ' + C.line + ';color:' + C.chalk + ';font-size:13px" /></div>';

        '<div class="flex items-center justify-between" style="margin-bottom:16px">' +
          '<div style="color:' + C.chalk + ';font-size:18px;font-weight:800">Registrar partido</div>' +
          '<button onclick="App.closeMatchForm()">' + icon("x", 20, C.muted) + '</button>' +
        '</div>' +

    var glossaryInner = "";

        '<a href="https://github.com/brunofiorucci" target="_blank" rel="noopener" class="flex flex-col items-center rounded-xl" style="gap:6px;padding:11px 4px;background:' + C.cardAlt + ';border:1px solid ' + C.line + ';text-decoration:none;color:' + C.chalk + ';font-size:10px">' + icon("github", 18, C.ochreBright) + '<span>GitHub</span></a>' +
        '<a href="mailto:brunofiorucci8@gmail.com" target="_blank" rel="noopener" class="flex flex-col items-center rounded-xl" style="gap:6px;padding:11px 4px;background:' + C.cardAlt + ';border:1px solid ' + C.line + ';text-decoration:none;color:' + C.chalk + ';font-size:10px">' + icon("mail", 18, C.ochreBright) + '<span>Email</span></a>' +
      '</div>' +
      '<div class="flex items-center justify-between" style="font-size:11px;color:' + C.muted + '">' +
        '<span>© ' + new Date().getFullYear() + ' Bruno Fiorucci</span>' +
        '<span class="rounded-full" style="padding:3px 9px;background:' + C.cardAlt + ';border:1px solid ' + C.line + '">v' + APP_VERSION + '</span>' +
      '</div>';
    html += infoSection("dev", "code", "Acerca del desarrollador", "Quién hizo esta app", devInner);
